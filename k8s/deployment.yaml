apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-page
  namespace: statuspage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: statuspage
  template:
    metadata:
      labels:
        app: statuspage
    spec:
      initContainers:
        - name: run-migrations
          image: 992382545251.dkr.ecr.us-east-1.amazonaws.com/yarin-noa-project:latest
          imagePullPolicy: Always
          workingDir: /app/statuspage
          command: ["/bin/sh", "-c"]
          args:
            - "python manage.py migrate --noinput"
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: statuspage-app-secrets
                  key: DB_PASSWORD
            - name: DB_HOST
              value: "statuspage-postgres-postgresql.default.svc.cluster.local"
            - name: REDIS_HOST
              value: "statuspage-redis-master.default.svc.cluster.local"
          envFrom:
            - secretRef:
                name: statuspage-app-secrets

      containers:
        - name: statuspage-container
          image: 992382545251.dkr.ecr.us-east-1.amazonaws.com/yarin-noa-project:latest
          imagePullPolicy: Always
          workingDir: /app/statuspage
          ports:
            - containerPort: 8000
          command: ["/bin/sh", "-c"]
          # --- הוספנו --timeout 120 כדי למנוע קריסות בזמן עלייה ---
          args:
            - "python manage.py collectstatic --noinput && gunicorn --bind 0.0.0.0:8000 --workers 3 --timeout 120 statuspage.wsgi:application"

          # --- הגדלת משאבים (Resources) - מעניק לאפליקציה כוח לעלות ---
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          # ------------------------------------------------------

          # --- Health Checks (Probes) - מותאמים לזמן עלייה ארוך יותר ---
          readinessProbe:
            httpGet:
              path: /dashboard/login/
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /dashboard/login/
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 15
          # ------------------------------

          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: statuspage-app-secrets
                  key: DB_PASSWORD
            - name: DB_HOST
              value: "statuspage-postgres-postgresql.default.svc.cluster.local"
            - name: REDIS_HOST
              value: "statuspage-redis-master.default.svc.cluster.local"
            # הוספנו מפורשות את ה-REDIS_PASSWORD למקרה שה-envFrom לא מושך אותו
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: statuspage-app-secrets
                  key: REDIS_PASSWORD
          envFrom:
            - secretRef:
                name: statuspage-app-secrets