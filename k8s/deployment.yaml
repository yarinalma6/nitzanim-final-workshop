apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-page
  namespace: statuspage # וודא שזה ה-Namespace הנכון
spec:
  replicas: 1
  selector:
    matchLabels:
      app: statuspage
  template:
    metadata:
      labels:
        app: statuspage
    spec:
      initContainers:
        - name: run-migrations
          image: 992382545251.dkr.ecr.us-east-1.amazonaws.com/yarin-noa-project:latest
          imagePullPolicy: Always
          workingDir: /app/statuspage
          command: ["/bin/sh", "-c"]
          args:
            - |
              python manage.py migrate --noinput
          env:
            - name: DB_HOST
              value: "statuspage-postgres-postgresql.default.svc.cluster.local"
            - name: DB_NAME
              value: "statuspage"
            - name: DB_USER
              value: "postgres"
            - name: REDIS_HOST
              value: "statuspage-redis-master.default.svc.cluster.local"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: statuspage-app-secrets
                  key: DB_PASSWORD
          envFrom:
            - secretRef:
                name: statuspage-app-secrets

      containers:
        - name: statuspage-container
          image: 992382545251.dkr.ecr.us-east-1.amazonaws.com/yarin-noa-project:latest
          imagePullPolicy: Always
          workingDir: /app/statuspage
          ports:
            - containerPort: 8000
          command: [ "/bin/sh", "-c" ]
          args:
            - |
              # איסוף קבצים סטטיים לפני עליית השרת
              python manage.py collectstatic --noinput
              # הרצה עם 3 וורקרים לביצועים ויציבות
              gunicorn --bind 0.0.0.0:8000 --workers 3 statuspage.wsgi:application

          readinessProbe:
            httpGet:
              path: /dashboard/login/
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /dashboard/login/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10

          # כאן היה התיקון - ה-env חייב להיות בתוך ה-container
          env:
            - name: DB_HOST
              value: "statuspage-postgres-postgresql.default.svc.cluster.local"
            - name: DB_NAME
              value: "statuspage"
            - name: DB_USER
              value: "postgres"
            - name: REDIS_HOST
              value: "statuspage-redis-master.default.svc.cluster.local"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: statuspage-app-secrets
                  key: DB_PASSWORD
          envFrom:
            - secretRef:
                name: statuspage-app-secrets