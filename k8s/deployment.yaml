apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-page
  namespace: statuspage # וודא שזה ה-Namespace הנכון
spec:
  replicas: 1
  selector:
    matchLabels:
      app: statuspage
  template:
    metadata:
      labels:
        app: statuspage
    spec:
      initContainers:
        - name: run-migrations
          image: 992382545251.dkr.ecr.us-east-1.amazonaws.com/yarin-noa-project:latest
          workingDir: /app/statuspage
          command: [ "/bin/sh", "-c" ]
          args:
            - |
              python manage.py migrate --noinput
          env: # <--- וודא שההזחה כאן מדויקת (מתחת ל-args)
            - name: POSTGRES_PASSWORD # השם שהקוד מחפש
              valueFrom:
                secretKeyRef:
                  name: statuspage-app-secrets
                  key: DB_PASSWORD # המפתח בתוך ה-Secret שלך
            - name: DB_HOST
              value: "statuspage-postgres-postgresql.default.svc.cluster.local"
          envFrom:
            - secretRef:
                name: statuspage-app-secrets

      containers:
        - name: statuspage-container
          image: 992382545251.dkr.ecr.us-east-1.amazonaws.com/yarin-noa-project:latest
          workingDir: /app/statuspage
          command: [ "/bin/sh", "-c" ]
          args:
            - |
              python manage.py collectstatic --noinput
              gunicorn --bind 0.0.0.0:8000 --workers 3 statuspage.wsgi:application
          env: # <--- כאן הייתה הטעות הקודמת, זה חייב להיות בתוך ה-container!
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: statuspage-app-secrets
                  key: DB_PASSWORD
            - name: DB_HOST
              value: "statuspage-postgres-postgresql.default.svc.cluster.local"
          envFrom:
            - secretRef:
                name: statuspage-app-secrets