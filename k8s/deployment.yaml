# ==============================================================================
# תצורת פריסה (Deployment) עבור אפליקציית ה-Status Page בקוברנטיס
# ==============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: statuspage
  template:
    metadata:
      labels:
        app: statuspage
    spec:
      initContainers:
        - name: run-migrations
          image: 992382545251.dkr.ecr.us-east-1.amazonaws.com/yarin-no-project:latest
          imagePullPolicy: Always
          # התיקייה שבה נמצא manage.py בתוך הקונטיינר
          workingDir: /app/statuspage
          command: ["/bin/sh", "-c"]
          args:
            - |
              # הרצת המיגרציות (הספריות כבר מותקנות ב-Image)
              python manage.py migrate --noinput
          env:
            - name: DB_HOST
              value: "statuspage-postgres-postgresql"
            - name: DB_NAME
              value: "statuspage"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: statuspage-app-secrets
                  key: DB_PASSWORD
          envFrom:
            - secretRef:
                name: statuspage-app-secrets

      containers:
      - name: statuspage-container
        image: 992382545251.dkr.ecr.us-east-1.amazonaws.com/yarin-no-project:latest
        imagePullPolicy: Always
        # התיקייה שבה נמצא manage.py
        workingDir: /app/statuspage
        ports:
          - containerPort: 8000
        command: ["/bin/sh", "-c"]
        args:
          - |
            # מריצים את השרת עם --insecure כדי להציג עיצוב
            python manage.py runserver 0.0.0.0:8000 --insecure
        env:
          - name: DB_HOST
            value: "statuspage-postgres-postgresql"
          - name: DB_NAME
            value: "statuspage"
          - name: DB_USER
            value: "postgres"
          - name: REDIS_URL
            value: "redis://statuspage-redis-master:6379"
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: statuspage-app-secrets
                key: DB_PASSWORD
        envFrom:
          - secretRef:
              name: statuspage-app-secrets