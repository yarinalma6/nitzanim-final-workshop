apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-page
spec:
  replicas: 2
  selector:
    matchLabels:
      app: statuspage
  template:
    metadata:
      labels:
        app: statuspage
    spec:
      containers:
      - name: statuspage-container
        image: 992382545251.dkr.ecr.us-east-1.amazonaws.com/yarin-noa-project:latest
        ports:
          - containerPort: 8000
        env:
          - name: DEBUG
            valueFrom:
              secretKeyRef:
                name: statuspage-app-secret
                key: debug-mode

          - name: SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: statuspage-app-secret
                key: django-secret-key

          # הגדרות פוסטגרס
          - name: DB_HOST
            value: "statuspage-postgres-postgresql" # השם של ה-Service שנוצר
          - name: DB_NAME
            value: "statuspage"
          - name: DB_USER
            value: "postgres"
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-pg-secret
                key: postgres-password

          # הגדרות רדיס
          - name: REDIS_URL
            value: "redis://statuspage-redis-master:6379"
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-redis-secret
                key: redis-password