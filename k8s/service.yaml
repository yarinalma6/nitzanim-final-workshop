# ==============================================================================
# תצורת שירות (Service) עבור אפליקציית ה-Status Page
# המטרה: חשיפת האפליקציה לרשת הפנימית של קוברנטיס כדי שה-Ingress יוכל לגשת אליה.
# ==============================================================================

apiVersion: v1
kind: Service
metadata:
  # השם שבו רכיבים אחרים בקלאסטר (כמו ה-Ingress) יקראו לאפליקציה שלנו
  name: status-page-service
spec:
  # סוג הסרביס. ClusterIP אומר שכתובת ה-IP תהיה פנימית וזמינה רק בתוך הקלאסטר.
  # (אם לא כותבים את השורה הזו בכלל, קוברנטיס בוחר ב-ClusterIP כברירת מחדל).
  type: ClusterIP
  
  # הגדרת הפורטים (הדלתות) שדרכם התקשורת עוברת
  ports:
    - port: 80        # הפורט של הסרביס עצמו. כשמישהו בתוך הקלאסטר פונה לסרביס, הוא יפנה לפורט 80.
      targetPort: 8000 # הפורט האמיתי שאליו הפודים שלנו (דג'נגו) מאזינים. הסרביס יתרגם 80 ל-8000.
      
  # ה"דבק" שמחבר בין הסרביס לפודים:
  # הסרביס מחפש בכל הקלאסטר פודים שיש להם את התווית (Label) "app: statuspage".
  # לכל פוד שמתאים לתווית הזו, הסרביס יעביר טראפיק.
  selector:
    app: statuspage